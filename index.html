const INSTRUMENTS = {
  "XAU/USD (Gold)": { pip: 0.1, valuePerLot: 10 },

const fmt = (n, d = 2) => isFinite(n) ? n.toLocaleString("en-US", { minimumFractionDigits: d, maximumFractionDigits: d }) : "—";

const emptyForm = (pair = "XAU/USD (Gold)", analyst = "Usama") => ({
  date: new Date().toISOString().slice(0, 10), analyst, pair,
  style: "scaled",
  entry: "", sl: "", lots: "", pipValue: INSTRUMENTS[pair].valuePerLot,
  tp: "", outcome: "TP Hit", exit: "",
  riskFree: "", tp1: "", tp2: "", splitA: 50, splitB: 25, splitC: 25, scaledOutcome: "Full", exitS: "", note: "",
});

function compute(t) {
  const inst = INSTRUMENTS[t.pair] || INSTRUMENTS.Custom;
  const entry = parseFloat(t.entry), sl = parseFloat(t.sl), lots = parseFloat(t.lots), pv = parseFloat(t.pipValue);
  if ([entry, sl, lots, pv].some((v) => !isFinite(v))) return null;
  const riskPips = Math.abs(entry - sl) / inst.pip;
  const dollarRisk = riskPips * pv * lots;
  if (riskPips <= 0) return null;
  if (t.style === "scaled") {
    const rf = parseFloat(t.riskFree), tp1 = parseFloat(t.tp1), tp2 = parseFloat(t.tp2);
    if ([rf, tp1, tp2].some((v) => !isFinite(v))) return null;
    const dir = tp2 >= entry ? 1 : -1;
    const A = (parseFloat(t.splitA) || 0) / 100, B = (parseFloat(t.splitB) || 0) / 100, Cc = (parseFloat(t.splitC) || 0) / 100;
    const rfPips = Math.abs(rf - entry) / inst.pip, tp1Pips = Math.abs(tp1 - entry) / inst.pip, tp2Pips = Math.abs(tp2 - entry) / inst.pip;
    const gA = rfPips * pv * lots * A, gB = tp1Pips * pv * lots * B, gC = tp2Pips * pv * lots * Cc;
    let result = 0;
    if (t.scaledOutcome === "Full SL") result = -dollarRisk;
    else if (t.scaledOutcome === "Risk-free") result = gA;
    else if (t.scaledOutcome === "TP1") result = gA + gB;
    else if (t.scaledOutcome === "Full") result = gA + gB + gC;
    else if (t.scaledOutcome === "Manual") { const ex = parseFloat(t.exitS); if (isFinite(ex)) result = ((ex - entry) / inst.pip) * dir * pv * lots; }
    const plannedRR = tp2Pips / riskPips;
    const blendedFullR = (rfPips * A + tp1Pips * B + tp2Pips * Cc) / riskPips;
    const slValid = dir === 1 ? sl < entry && rf > entry && tp1 > entry && tp2 >= tp1 : sl > entry && rf < entry && tp1 < entry && tp2 <= tp1;
    return { dir, riskPips, dollarRisk, result, rMultiple: dollarRisk > 0 ? result / dollarRisk : 0, plannedRR, blendedFullR, slValid, scaled: true };
  }
  const tp = parseFloat(t.tp);
  if (!isFinite(tp)) return null;
  const dir = tp >= entry ? 1 : -1;
  const rewardPips = Math.abs(tp - entry) / inst.pip;
  const plannedRR = rewardPips / riskPips;
  const dollarReward = rewardPips * pv * lots;
  const slValid = dir === 1 ? sl < entry : sl > entry;
  let result = 0;
  if (t.outcome === "TP Hit") result = dollarReward;
  else if (t.outcome === "SL Hit") result = -dollarRisk;
  else if (t.outcome === "Breakeven") result = 0;
  else if (t.outcome === "Manual") { const ex = parseFloat(t.exit); if (isFinite(ex)) result = ((ex - entry) / inst.pip) * dir * pv * lots; }
  return { dir, riskPips, dollarRisk, dollarReward, result, rMultiple: dollarRisk > 0 ? result / dollarRisk : 0, plannedRR, slValid, scaled: false };
}
// Price the trade was effectively closed at. Scaled trades exit in pieces, so this
// returns the FINAL leg's level (TP2 on a full win, SL on a full loss, etc.).
function closedPrice(t) {
  if (t.style === "scaled") {
    if (t.scaledOutcome === "Full SL") return t.sl;
    if (t.scaledOutcome === "Manual") return t.exitS;
    if (t.scaledOutcome === "Full") return t.tp2;
    if (t.scaledOutcome === "TP1") return t.tp1;
    if (t.scaledOutcome === "Risk-free") return t.riskFree;
    return "";
  }
  if (t.outcome === "TP Hit") return t.tp;
  if (t.outcome === "SL Hit") return t.sl;
  if (t.outcome === "Breakeven") return t.entry;
  if (t.outcome === "Manual") return t.exit;
  return "";
}
function periodKey(dateStr, mode) {
  const d = new Date(dateStr + "T00:00:00");
  if (mode === "day") return dateStr;
  if (mode === "month") return dateStr.slice(0, 7);
  const day = d.getDay(), diff = day === 0 ? -6 : 1 - day, m = new Date(d);
  m.setDate(d.getDate() + diff);
  return m.toISOString().slice(0, 10);
}
function periodLabel(key, mode) {
  if (mode === "month") return new Date(key + "-01T00:00:00").toLocaleDateString("en-US", { month: "long", year: "numeric" });
  if (mode === "day") return new Date(key + "T00:00:00").toLocaleDateString("en-US", { weekday: "short", day: "2-digit", month: "short", year: "numeric" });
  const s = new Date(key + "T00:00:00"), e = new Date(s); e.setDate(s.getDate() + 6);
  const f = (x) => x.toLocaleDateString("en-US", { day: "2-digit", month: "short" });
  return "Week of " + f(s) + " – " + f(e);
}

const C = { bg:"#0a0d10", panel:"#11161b", panel2:"#161d24", line:"#222c35", text:"#dfe7ec", dim:"#6f7e8a", green:"#36d399", red:"#f76d77", amber:"#e8b04b", blue:"#5aa9e6", purple:"#b48ce8" };
const inp = (border) => ({ width:"100%", background:C.bg, border:"1px solid " + (border || C.line), color:C.text, padding:"9px 10px", borderRadius:6, fontSize:13 });

function Field({ label, children }) { return <div style={{ flex:1, marginBottom:10 }}><div style={{ color:C.dim, fontSize:10, letterSpacing:"1px", marginBottom:4 }}>{label}</div>{children}</div>; }

}
function TradeCard({ e, onEdit, onDel }) {
  const c = e.calc, t = e.raw, rc = c.result > 0 ? C.green : c.result < 0 ? C.red : C.dim;
  const ac = t.analyst === "Usama" ? C.blue : t.analyst === "Meower" ? C.purple : C.dim;

        <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap" }}>
          {t.analyst && <span style={{ fontSize:10, padding:"2px 6px", borderRadius:4, background:ac + "22", color:ac, fontWeight:700 }}>{t.analyst}</span>}
          <span style={{ fontWeight:700, fontSize:13 }}>{t.pair.replace(" (Gold)","")}</span>
          <span style={{ fontSize:10, padding:"2px 6px", borderRadius:4, background: c.dir===1?"rgba(54,211,153,.15)":"rgba(247,109,119,.15)", color: c.dir===1?C.green:C.red }}>{c.dir===1?"LONG":"SHORT"}</span>
          <span style={{ color:C.dim, fontSize:11 }}>{t.date}</span>
        </div>
        <div style={{ textAlign:"right" }}>
          <div style={{ color:rc, fontWeight:700, fontSize:15 }}>{c.result >= 0 ? "+" : "−"}${fmt(Math.abs(c.result))}</div>
          <div style={{ color:rc, fontSize:10 }}>{c.rMultiple >= 0 ? "+" : ""}{fmt(c.rMultiple)}R · bal ${fmt(e.balanceAfter,0)}</div>
        </div>
      </div>
      <div style={{ display:"flex", flexWrap:"wrap", gap:"2px 14px", fontSize:11, color:C.dim }}>
        <span>E {t.entry}</span><span style={{ color:rc }}>→ close {closedPrice(t)}</span><span>SL {t.sl}</span>
        {c.scaled ? <React.Fragment><span>RF {t.riskFree}</span><span>TP1 {t.tp1}</span><span>TP2 {t.tp2}</span><span>{t.splitA}/{t.splitB}/{t.splitC}</span></React.Fragment> : <span>TP {t.tp}</span>}
        <span>{t.lots} lot</span><span>1:{fmt(c.plannedRR)}</span><span>risk ${fmt(c.dollarRisk)}</span>
        <span style={{ color:rc }}>{c.scaled ? t.scaledOutcome : t.outcome}</span>
      </div>
      {t.note && <div style={{ color:C.dim, fontSize:11, marginTop:4, fontStyle:"italic" }}>“{t.note}”</div>}
      <div style={{ display:"flex", gap:8, marginTop:8 }}>
        <button onClick={() => onEdit(t)} style={miniBtn(C.blue)}>EDIT</button>
        <button onClick={() => onDel(t.id)} style={miniBtn(C.red)}>DELETE</button>
      </div>
    </div>
  );
}
function WdCard({ e, onDel }) {
  const w = e.raw, dep = w.type === "deposit", col = dep ? C.green : C.amber;
  return (

        <div style={{ textAlign:"right" }}><div style={{ color:col, fontWeight:700, fontSize:14 }}>{dep ? "+" : "−"}${fmt(w.amount)}</div><div style={{ color:C.dim, fontSize:10 }}>bal ${fmt(e.balanceAfter,0)}</div></div>

      <div style={{ marginTop:6 }}><button onClick={() => onDel(w.id)} style={miniBtn(C.red)}>DELETE</button></div>
    </div>

}
function Equity({ data, start }) {
  const w = 700, h = 90, pad = 4, ys = data.map((d) => d.y), min = Math.min(...ys), max = Math.max(...ys), range = max - min || 1;
  const pts = data.map((d, i) => (pad + (i / (data.length - 1)) * (w - pad * 2)) + "," + (h - pad - ((d.y - min) / range) * (h - pad * 2)));
  const up = data[data.length - 1].y >= start;
  return <div style={{ background:C.panel, border:"1px solid " + C.line, borderRadius:10, padding:12, marginBottom:14 }}><div style={{ color:C.dim, fontSize:9.5, letterSpacing:"1px", marginBottom:6 }}>BALANCE CURVE (incl. withdrawals)</div><svg viewBox={"0 0 " + w + " " + h} style={{ width:"100%", height:90, display:"block" }} preserveAspectRatio="none"><polyline points={pts.join(" ")} fill="none" stroke={up ? C.green : C.red} strokeWidth="2" vectorEffect="non-scaling-stroke" /></svg></div>;
}

function centerBox(children) {

  };
  return centerBox(<React.Fragment>

    {err && <div style={{ color:C.red, fontSize:12, marginBottom:10 }}>{err}</div>}
    <button onClick={go} disabled={busy} style={{ width:"100%", background:C.green, color:"#06251a", border:"none", padding:"12px", borderRadius:8, fontWeight:700, fontSize:14 }}>{busy ? "Signing in…" : "SIGN IN"}</button>
    <div style={{ color:C.dim, fontSize:10, marginTop:12, lineHeight:1.5 }}>Accounts are created in your Supabase dashboard (Authentication → Users). Public sign-up is off.</div>
  </React.Fragment>);
}

function TradeJournal({ session, onSignOut }) {
  const [trades, setTrades] = useState([]);
  const [withdrawals, setWithdrawals] = useState([]);
  const [analysts, setAnalysts] = useState(DEFAULT_ANALYSTS);
  const [manageAnalysts, setManageAnalysts] = useState(false);
  const [newAnalyst, setNewAnalyst] = useState("");
  const [openWeeks, setOpenWeeks] = useState({});
  const [startBalance, setStartBalance] = useState(2000);
  const [groupBy, setGroupBy] = useState("week");
  const [loading, setLoading] = useState(true);
  const [syncing, setSyncing] = useState(false);
  const [collapsed, setCollapsed] = useState({});
  const [openAnalyst, setOpenAnalyst] = useState(null);
  const [form, setForm] = useState(emptyForm());
  const [wd, setWd] = useState({ date: new Date().toISOString().slice(0, 10), amount: "", note: "", type: "deposit" });
  const [pane, setPane] = useState("trade");
  const [editId, setEditId] = useState(null);
  const [vw, setVw] = useState(typeof window !== "undefined" ? window.innerWidth : 1200);
  useEffect(() => {
    const onResize = () => setVw(window.innerWidth);
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, []);
  const wide = vw >= 1100; // two-column desktop layout above this width; below it stays as the mobile layout

  const fetchAll = async () => {
    try {
      const [tr, wr, st] = await Promise.all([
        sb.from("trades").select("id,data"),
        sb.from("withdrawals").select("id,data"),
        sb.from("settings").select("*").eq("id", 1).maybeSingle(),
      ]);
      setTrades((tr.data || []).map((r) => ({ ...r.data, id: r.id })));
      setWithdrawals((wr.data || []).map((r) => ({ ...r.data, id: r.id })));
      if (st.data) {
        setStartBalance(st.data.start_balance != null ? Number(st.data.start_balance) : 2000);
        setGroupBy(st.data.group_by || "week");
        if (Array.isArray(st.data.analysts) && st.data.analysts.length) setAnalysts(st.data.analysts);
      }
    } catch (e) { console.error(e); }
    setLoading(false);
  };
  useEffect(() => { fetchAll(); }, []);
  useEffect(() => {
    if (loading) return;
    (async () => {
      // Try saving with the analyst list. If the "analysts" column does not exist yet
      // (you haven't run the ALTER TABLE), fall back to saving the rest so nothing breaks.
      const { error } = await sb.from("settings").upsert({ id: 1, start_balance: startBalance, group_by: groupBy, analysts });
      if (error) await sb.from("settings").upsert({ id: 1, start_balance: startBalance, group_by: groupBy });
    })();
  }, [startBalance, groupBy, analysts, loading]);

  const preview = useMemo(() => compute(form), [form]);
  const setField = (k, v) => setForm((f) => {
    const n = { ...f, [k]: v };
    if (k === "pair") n.pipValue = INSTRUMENTS[v].valuePerLot;
    return n;
  });

  const addAnalyst = (name) => {
    const n = (name || "").trim();
    if (!n) return;
    if (analysts.some((a) => a.toLowerCase() === n.toLowerCase())) return;
    setAnalysts([...analysts, n]);
  };
  const removeAnalyst = (name) => {
    const count = trades.filter((t) => (t.analyst || "") === name).length;
    if (count > 0 && !window.confirm(name + " has " + count + " logged trade" + (count !== 1 ? "s" : "") + ". Removing only takes the name off the dropdown — those trades stay in your history and analyst breakdown. Continue?")) return;
    setAnalysts(analysts.filter((a) => a !== name));
  };

  const saveTrade = async () => {
    if (!compute(form)) return;
    const id = editId || Date.now();
    setSyncing(true);
    await sb.from("trades").upsert({ id, data: { ...form, id } });
    setEditId(null); setForm({ ...emptyForm(form.pair, form.analyst), style: form.style });
    await fetchAll(); setSyncing(false);
  };
  const editTrade = (t) => { setForm({ ...emptyForm(t.pair, t.analyst), ...t }); setEditId(t.id); setPane("trade"); window.scrollTo({ top: 0, behavior: "smooth" }); };
  const deleteTrade = async (id) => { setSyncing(true); await sb.from("trades").delete().eq("id", id); if (editId === id) { setEditId(null); setForm(emptyForm(form.pair, form.analyst)); } await fetchAll(); setSyncing(false); };
  const saveWd = async () => { const amt = parseFloat(wd.amount); if (!isFinite(amt) || amt <= 0) return; const id = Date.now(); setSyncing(true); await sb.from("withdrawals").upsert({ id, data: { ...wd, amount: amt, id } }); setWd({ date: new Date().toISOString().slice(0, 10), amount: "", note: "", type: wd.type }); await fetchAll(); setSyncing(false); };
  const deleteWd = async (id) => { setSyncing(true); await sb.from("withdrawals").delete().eq("id", id); await fetchAll(); setSyncing(false); };

  const model = useMemo(() => {
    const events = [
      ...trades.map((t) => ({ kind: "trade", date: t.date, id: t.id, raw: t, calc: compute(t) })),
      ...withdrawals.map((w) => ({ kind: "wd", date: w.date, id: w.id, raw: w })),
    ].filter((e) => e.kind === "wd" || e.calc).sort((a, b) => (a.date < b.date ? -1 : a.date > b.date ? 1 : a.id - b.id));
    let bal = startBalance, tradeCum = 0, peak = startBalance, maxDD = 0, withdrawnTot = 0, depositedTot = 0;
    let wins = 0, losses = 0, be = 0, pl = 0, rSum = 0, rrSum = 0, rrCount = 0;
    const equity = [{ x: 0, y: startBalance }], gmap = new Map(); const byAnalyst = {};
    events.forEach((e, i) => {
      const before = bal, key = periodKey(e.date, groupBy);
      if (!gmap.has(key)) gmap.set(key, { key, label: periodLabel(key, groupBy), items: [], trades: 0, wins: 0, losses: 0, be: 0, pl: 0, withdrawn: 0, deposited: 0, openBal: before, closeBal: before });
      const g = gmap.get(key);
      if (e.kind === "trade") {
        const c = e.calc;
        bal += c.result; tradeCum += c.result; pl += c.result; rSum += c.rMultiple;
        if (c.plannedRR) { rrSum += c.plannedRR; rrCount++; }
        const w = c.result > 0, l = c.result < 0;
        if (w) { wins++; g.wins++; } else if (l) { losses++; g.losses++; } else { be++; g.be++; }
        g.trades++; g.pl += c.result;
        const a = e.raw.analyst || "Other";
        if (!byAnalyst[a]) byAnalyst[a] = { name: a, n: 0, w: 0, l: 0, be: 0, r: 0, pl: 0, items: [] };
        const ba = byAnalyst[a]; ba.n++; ba.r += c.rMultiple; ba.pl += c.result;
        if (w) ba.w++; else if (l) ba.l++; else ba.be++;
        ba.items.push({ date: e.date, id: e.id, raw: e.raw, calc: c, balanceAfter: bal });
        const perf = startBalance + tradeCum;
        peak = Math.max(peak, perf); maxDD = Math.max(maxDD, peak - perf);
      } else if (e.raw.type === "deposit") { bal += e.raw.amount; depositedTot += e.raw.amount; g.deposited += e.raw.amount; }
      else { bal -= e.raw.amount; withdrawnTot += e.raw.amount; g.withdrawn += e.raw.amount; }
      g.items.push({ ...e, balanceAfter: bal });
      g.closeBal = bal; // updated on every event; chronological order means the last write is the period's closing balance
      equity.push({ x: i + 1, y: bal });
    });
    const groups = [...gmap.values()].sort((a, b) => (a.key < b.key ? 1 : -1));
    groups.forEach((g) => g.items.sort((a, b) => (a.date < b.date ? 1 : b.id - a.id)));
    const decided = wins + losses;
    const analystStats = Object.values(byAnalyst).map((a) => ({ ...a, items: [...a.items].sort((x, y) => (x.date < y.date ? 1 : x.date > y.date ? -1 : y.id - x.id)), winRate: a.w + a.l ? (a.w / (a.w + a.l)) * 100 : 0, exp: a.n ? a.r / a.n : 0 })).sort((a, b) => b.pl - a.pl);
    return { balance: bal, pl, wins, losses, be, withdrawnTot, depositedTot, winRate: decided ? (wins / decided) * 100 : 0, avgRR: rrCount ? rrSum / rrCount : 0, expectancy: trades.length ? rSum / trades.length : 0, maxDD, maxDDpct: peak ? (maxDD / peak) * 100 : 0, equity, groups, count: trades.length, analysts: analystStats };
  }, [trades, withdrawals, startBalance, groupBy]);

  const toggle = (k) => setCollapsed((c) => ({ ...c, [k]: !c[k] }));
  const allCollapsed = model.groups.length > 0 && model.groups.every((g) => collapsed[g.key]);
  const toggleAll = () => { if (allCollapsed) setCollapsed({}); else { const n = {}; model.groups.forEach((g) => (n[g.key] = true)); setCollapsed(n); } };

  const exportCSV = () => {
    const head = ["Date","Analyst","Style","Pair","Dir","Entry","SL","Lots","RiskFree/TP","TP1","TP2","Outcome","$Risk","$Result","R","BalAfter","Note"];
    const rows = [];
    [...model.groups].reverse().forEach((g) => [...g.items].reverse().forEach((e) => {
      if (e.kind === "trade") { const c = e.calc, t = e.raw;
        rows.push([t.date,t.analyst||"",t.style,t.pair,c.dir===1?"L":"S",t.entry,t.sl,t.lots,t.style==="scaled"?t.riskFree:t.tp,t.tp1||"",t.tp2||"",t.style==="scaled"?t.scaledOutcome:t.outcome,fmt(c.dollarRisk),fmt(c.result),fmt(c.rMultiple),fmt(e.balanceAfter),(t.note||"").replace(/,/g,";")].join(","));
      } else { const w = e.raw; rows.push([w.date,"","WITHDRAWAL","","","","","","","","","",fmt(-w.amount),"",fmt(e.balanceAfter),(w.note||"").replace(/,/g,";")].join(",")); }
    }));
    const blob = new Blob([[head.join(","), ...rows].join("\n")], { type: "text/csv" });
    const url = URL.createObjectURL(blob), a = document.createElement("a"); a.href = url; a.download = "trade-journal.csv"; a.click(); URL.revokeObjectURL(url);
  };

  const fileRef = React.useRef(null);
  const backup = () => {
    const payload = { trades, withdrawals, settings: { startBalance, groupBy, analysts }, exportedAt: new Date().toISOString() };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob), a = document.createElement("a"); a.href = url; a.download = "trade-journal-backup.json"; a.click(); URL.revokeObjectURL(url);
  };
  const restore = async (file) => {
    if (!file) return;
    try {
      const p = JSON.parse(await file.text());
      if (!Array.isArray(p.trades) && !Array.isArray(p.withdrawals)) { alert("That file doesn't look like a journal backup."); return; }
      setSyncing(true);
      if (p.trades && p.trades.length) await sb.from("trades").upsert(p.trades.map((t) => ({ id: t.id, data: t })));
      if (p.withdrawals && p.withdrawals.length) await sb.from("withdrawals").upsert(p.withdrawals.map((w) => ({ id: w.id, data: w })));
      if (p.settings) {
        const restored = { id: 1, start_balance: p.settings.startBalance != null ? p.settings.startBalance : 2000, group_by: p.settings.groupBy || "week" };
        if (Array.isArray(p.settings.analysts)) restored.analysts = p.settings.analysts;
        const { error } = await sb.from("settings").upsert(restored);
        if (error) { delete restored.analysts; await sb.from("settings").upsert(restored); }
      }
      await fetchAll(); setSyncing(false);
      alert("Restore complete — your trades are loaded.");
    } catch (e) { setSyncing(false); alert("Could not read that file: " + e.message); }
  };

  const riskPct = preview && model.balance > 0 ? (preview.dollarRisk / model.balance) * 100 : 0;

  if (loading) return centerBox(<div style={{ color:C.dim, textAlign:"center" }}>Loading your journal…</div>);

  return (
    <div style={{ minHeight:"100vh", background:C.bg, color:C.text, fontFamily:"'JetBrains Mono', ui-monospace, monospace", padding:"16px 12px 60px" }}>
      <div style={{ maxWidth: wide ? 1180 : 720, margin:"0 auto" }}>
        <div style={{ display:"flex", alignItems:"baseline", justifyContent:"space-between", marginBottom:6, flexWrap:"wrap", gap:8 }}>
          <div>
            <div style={{ fontFamily:"Archivo, sans-serif", fontWeight:800, fontSize:26, letterSpacing:"-0.5px" }}>TRADE<span style={{ color:C.amber }}>·</span>JOURNAL</div>
            <div style={{ color:C.dim, fontSize:11, letterSpacing:"1px" }}>SHARED CLOUD · {session.user.email}</div>
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:8 }}>
            <span style={{ color:C.dim, fontSize:11 }}>START $</span>
            <input type="number" value={startBalance} onChange={(e) => setStartBalance(parseFloat(e.target.value) || 0)} style={{ width:84, background:C.panel, border:"1px solid " + C.line, color:C.text, padding:"6px 8px", borderRadius:6, fontSize:13 }} />
          </div>
        </div>
        <div style={{ display:"flex", justifyContent:"flex-end", gap:8, marginBottom:14 }}>
          <span style={{ color:C.dim, fontSize:10, alignSelf:"center" }}>{syncing ? "syncing…" : "synced ✓"}</span>
          <button onClick={fetchAll} style={{ background:"transparent", border:"1px solid " + C.line, color:C.dim, padding:"4px 10px", borderRadius:6, fontSize:11 }}>↻ Sync</button>
          <button onClick={onSignOut} style={{ background:"transparent", border:"1px solid " + C.line, color:C.dim, padding:"4px 10px", borderRadius:6, fontSize:11 }}>Sign out</button>
        </div>

        <div style={{ display:"grid", gridTemplateColumns: wide ? "repeat(3,1fr)" : "repeat(2,1fr)", gap:8, marginBottom:14 }}>
          <Stat label="BALANCE" value={"$" + fmt(model.balance)} sub={"start $" + fmt(startBalance,0) + " · in $" + fmt(model.depositedTot,0) + " · out $" + fmt(model.withdrawnTot,0)} color={model.balance >= startBalance ? C.green : C.red} big />
          <Stat label="NET TRADING P/L" value={(model.pl >= 0 ? "+" : "−") + "$" + fmt(Math.abs(model.pl))} color={model.pl >= 0 ? C.green : C.red} big />
          <Stat label="WIN RATE" value={fmt(model.winRate,1) + "%"} sub={model.wins + "W · " + model.losses + "L · " + model.be + "BE"} color={C.text} />
          <Stat label="EXPECTANCY" value={(model.expectancy >= 0 ? "+" : "") + fmt(model.expectancy) + "R"} sub="avg per trade" color={model.expectancy >= 0 ? C.green : C.red} />
          <Stat label="AVG PLANNED RR" value={"1:" + fmt(model.avgRR)} color={C.blue} />
          <Stat label="MAX DRAWDOWN" value={"$" + fmt(model.maxDD)} sub={fmt(model.maxDDpct,1) + "% (trading)"} color={C.amber} />
        </div>

        {model.analysts.length > 0 && (
          <div style={{ background:C.panel, border:"1px solid " + C.line, borderRadius:10, padding:"12px 14px", marginBottom:14 }}>
            <div style={{ color:C.dim, fontSize:9.5, letterSpacing:"1px", marginBottom:8 }}>BY ANALYST — is each one actually profitable? <span style={{ color:C.dim }}>(tap a name → weeks)</span></div>
            {model.analysts.map((a) => (
              <React.Fragment key={a.name}>
                <div onClick={() => setOpenAnalyst(openAnalyst === a.name ? null : a.name)} style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"6px 0", borderTop:"1px solid " + C.line, cursor:"pointer" }}>
                  <div style={{ display:"flex", alignItems:"center", gap:8, minWidth:0 }}>
                    <span style={{ color:C.dim, fontSize:10, transform: openAnalyst === a.name ? "rotate(90deg)" : "none", transition:"transform .15s" }}>▶</span>
                    <span style={{ fontWeight:700, fontSize:13, color: a.name==="Usama"?C.blue:a.name==="Meower"?C.purple:C.text }}>{a.name}</span>
                    <span style={{ color:C.dim, fontSize:10.5 }}>{a.n} trades · <span style={{color:C.green}}>{a.w}W</span> <span style={{color:C.red}}>{a.l}L</span> {a.be}BE · {fmt(a.winRate,0)}%</span>
                  </div>
                  <div style={{ textAlign:"right" }}>
                    <div style={{ color: a.pl>=0?C.green:C.red, fontWeight:700, fontSize:13 }}>{a.pl>=0?"+":"−"}${fmt(Math.abs(a.pl))}</div>
                    <div style={{ color: a.exp>=0?C.green:C.red, fontSize:10 }}>{a.exp>=0?"+":""}{fmt(a.exp)}R exp</div>
                  </div>
                </div>
                {openAnalyst === a.name && (
                  <div style={{ paddingLeft:18, paddingBottom:8 }}>
                    {(() => {
                      const wm = new Map();
                      a.items.forEach((t) => { const k = periodKey(t.date, "week"); if (!wm.has(k)) wm.set(k, []); wm.get(k).push(t); });
                      const weeks = [...wm.entries()].map(([k, its]) => ({ key:k, label:periodLabel(k,"week"), items:its, pl:its.reduce((s,x)=>s+x.calc.result,0), w:its.filter(x=>x.calc.result>0).length, l:its.filter(x=>x.calc.result<0).length })).sort((x,y)=> x.key<y.key?1:-1);
                      return weeks.map((wk) => {
                        const wkKey = a.name + "|" + wk.key, wkOpen = openWeeks[wkKey] !== false, wpc = wk.pl>0?C.green:wk.pl<0?C.red:C.dim;
                        return (
                          <div key={wk.key} style={{ marginBottom:2 }}>
                            <div onClick={() => setOpenWeeks((o) => ({ ...o, [wkKey]: o[wkKey] === false ? true : false }))} style={{ display:"flex", alignItems:"center", justifyContent:"space-between", gap:8, padding:"5px 0", borderTop:"1px solid " + C.line, cursor:"pointer" }}>
                              <div style={{ display:"flex", alignItems:"center", gap:6, minWidth:0 }}>
                                <span style={{ color:C.dim, fontSize:9, transform: wkOpen?"rotate(90deg)":"none", transition:"transform .15s" }}>▶</span>
                                <span style={{ fontSize:11, color:C.text, whiteSpace:"nowrap" }}>{wk.label}</span>
                                <span style={{ fontSize:10, color:C.dim }}><span style={{color:C.green}}>{wk.w}W</span> <span style={{color:C.red}}>{wk.l}L</span></span>
                              </div>
                              <span style={{ fontSize:11, fontWeight:700, color:wpc, flexShrink:0 }}>{wk.pl>=0?"+":"−"}${fmt(Math.abs(wk.pl))}</span>
                            </div>
                            {wkOpen && wk.items.map((t) => (
                              <div key={t.id} onClick={() => editTrade(t.raw)} title="Tap to edit this trade" style={{ display:"flex", justifyContent:"space-between", alignItems:"center", gap:8, fontSize:11, padding:"6px 0 6px 14px", borderTop:"1px dashed " + C.line, color:C.dim, cursor:"pointer" }}>
                                <div style={{ minWidth:0 }}>
                                  <div style={{ overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                                    {t.date} · <b style={{ color: t.calc.dir===1?C.green:C.red }}>{t.calc.dir===1?"LONG":"SHORT"}</b> · {t.raw.lots} lot · {t.raw.style==="scaled" ? t.raw.scaledOutcome : t.raw.outcome}
                                  </div>
                                  <div style={{ fontSize:10, color:C.dim, marginTop:1, whiteSpace:"nowrap" }}>
                                    E {t.raw.entry} <span style={{ color: t.calc.result>0?C.green:t.calc.result<0?C.red:C.dim }}>→ {closedPrice(t.raw)}</span>
                                  </div>
                                </div>
                                <span style={{ flexShrink:0, textAlign:"right", color: t.calc.result>0?C.green:t.calc.result<0?C.red:C.dim }}>
                                  {t.calc.result>=0?"+":"−"}${fmt(Math.abs(t.calc.result))} <span style={{ fontSize:10 }}>({t.calc.rMultiple>=0?"+":""}{fmt(t.calc.rMultiple)}R)</span>
                                </span>
                              </div>
                            ))}
                          </div>
                        );
                      });
                    })()}
                  </div>
                )}
              </React.Fragment>
            ))}
          </div>
        )}

        {model.equity.length > 1 && <Equity data={model.equity} start={startBalance} />}

        <div style={wide ? { display:"flex", gap:16, alignItems:"flex-start" } : undefined}>
        <div style={wide ? { flex:"0 0 400px", minWidth:0 } : undefined}>

        <div style={{ display:"flex", gap:8, marginBottom: pane ? 8 : 14 }}>
          <button onClick={() => setPane(pane === "trade" ? null : "trade")} style={{ flex:1, background: pane==="trade"?C.panel:C.panel2, border:"1px solid " + (pane==="trade"?C.blue:C.line), color:C.text, padding:"10px", borderRadius:8, fontSize:13, fontWeight:700 }}>{editId ? "▲ EDIT TRADE" : "＋ TRADE"}</button>
          <button onClick={() => setPane(pane === "wd" ? null : "wd")} style={{ flex:1, background: pane==="wd"?C.panel:C.panel2, border:"1px solid " + (pane==="wd"?C.amber:C.line), color:C.amber, padding:"10px", borderRadius:8, fontSize:13, fontWeight:700 }}>± CASH IN / OUT</button>
        </div>

        {pane === "trade" && (
          <div style={{ background:C.panel, border:"1px solid " + C.line, borderRadius:10, padding:14, marginBottom:16 }}>
            <Row><Field label="DATE"><input type="date" value={form.date} onChange={(e) => setField("date", e.target.value)} style={inp()} /></Field>
              <Field label="ANALYST"><select value={form.analyst} onChange={(e) => setField("analyst", e.target.value)} style={inp()}>{(analysts.includes(form.analyst) ? analysts : [...analysts, form.analyst]).map((a) => <option key={a}>{a}</option>)}</select></Field></Row>

            <div style={{ marginTop:-4, marginBottom:10 }}>
              <button onClick={() => setManageAnalysts((v) => !v)} style={{ background:"transparent", border:"none", color:C.blue, fontSize:10.5, padding:0, cursor:"pointer", letterSpacing:"0.5px" }}>{manageAnalysts ? "− hide analyst manager" : "+ add / remove analyst"}</button>
              {manageAnalysts && (
                <div style={{ marginTop:8, padding:10, background:C.bg, border:"1px solid " + C.line, borderRadius:6 }}>
                  <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginBottom:8 }}>
                    {analysts.map((a) => (
                      <span key={a} style={{ display:"inline-flex", alignItems:"center", gap:6, background:C.panel2, border:"1px solid " + C.line, borderRadius:20, padding:"4px 6px 4px 10px", fontSize:11 }}>
                        {a}
                        <span onClick={() => removeAnalyst(a)} title="remove from dropdown (keeps trades)" style={{ cursor:"pointer", color:C.red, fontSize:14, lineHeight:1 }}>×</span>
                      </span>
                    ))}
                    {analysts.length === 0 && <span style={{ color:C.dim, fontSize:11 }}>No analysts yet — add one below.</span>}
                  </div>
                  <div style={{ display:"flex", gap:6 }}>
                    <input value={newAnalyst} onChange={(e) => setNewAnalyst(e.target.value)} onKeyDown={(e) => { if (e.key === "Enter") { addAnalyst(newAnalyst); setNewAnalyst(""); } }} placeholder="new analyst name" style={{ ...inp(), flex:1 }} />
                    <button onClick={() => { addAnalyst(newAnalyst); setNewAnalyst(""); }} style={{ background:C.blue, color:"#04223a", border:"none", padding:"0 16px", borderRadius:6, fontWeight:700, fontSize:12 }}>ADD</button>
                  </div>
                  <div style={{ color:C.dim, fontSize:9.5, marginTop:8, lineHeight:1.5 }}>Removing a name only takes it off this dropdown. Past trades and their analyst breakdown stay. Requires the one-time SQL column to sync with Dani.</div>
                </div>
              )}
            </div>

            <Row><Field label="PAIR"><select value={form.pair} onChange={(e) => setField("pair", e.target.value)} style={inp()}>{Object.keys(INSTRUMENTS).map((k) => <option key={k}>{k}</option>)}</select></Field>
              <Field label="STYLE">
                <div style={{ display:"flex", gap:4, background:C.bg, border:"1px solid " + C.line, borderRadius:6, padding:3 }}>
                  {["simple","scaled"].map((s) => <button key={s} onClick={() => setField("style", s)} style={{ flex:1, background: form.style===s?C.panel2:"transparent", color: form.style===s?C.text:C.dim, border:"none", padding:"6px", borderRadius:4, fontSize:11, fontWeight: form.style===s?700:400 }}>{s==="simple"?"Simple":"TP1 & TP2"}</button>)}
                </div>
              </Field></Row>
            <Row><Field label="ENTRY"><input type="number" step="any" value={form.entry} onChange={(e) => setField("entry", e.target.value)} placeholder="4500.00" style={inp()} /></Field>
              <Field label="LOT SIZE"><input type="number" step="any" value={form.lots} onChange={(e) => setField("lots", e.target.value)} placeholder="0.05" style={inp()} /></Field></Row>
            <Row><Field label="STOP LOSS"><input type="number" step="any" value={form.sl} onChange={(e) => setField("sl", e.target.value)} placeholder="4495.00" style={inp(!preview || preview.slValid ? C.line : C.red)} /></Field>
              <Field label="PIP VALUE / LOT ($)"><input type="number" step="any" value={form.pipValue} onChange={(e) => setField("pipValue", e.target.value)} style={inp()} /></Field></Row>

            {form.style === "simple" ? (
              <React.Fragment>
                <Row><Field label="TAKE PROFIT"><input type="number" step="any" value={form.tp} onChange={(e) => setField("tp", e.target.value)} placeholder="4520.00" style={inp()} /></Field>
                  <Field label="OUTCOME"><select value={form.outcome} onChange={(e) => setField("outcome", e.target.value)} style={inp()}><option>TP Hit</option><option>SL Hit</option><option>Breakeven</option><option>Manual</option></select></Field></Row>
                {form.outcome === "Manual" && <Field label="MANUAL EXIT"><input type="number" step="any" value={form.exit} onChange={(e) => setField("exit", e.target.value)} style={inp()} /></Field>}
              </React.Fragment>
            ) : (
              <React.Fragment>
                <Row><Field label="RISK-FREE LVL"><input type="number" step="any" value={form.riskFree} onChange={(e) => setField("riskFree", e.target.value)} placeholder="4505.00" style={inp()} /></Field>
                  <Field label="OUTCOME"><select value={form.scaledOutcome} onChange={(e) => setField("scaledOutcome", e.target.value)} style={inp()}><option value="Full SL">Full SL (lost)</option><option value="Risk-free">Risk-free, rest BE</option><option value="TP1">TP1, rest BE</option><option value="Full">TP1 + TP2 (full)</option><option value="Manual">Manual</option></select></Field></Row>
                <Row><Field label="TP1"><input type="number" step="any" value={form.tp1} onChange={(e) => setField("tp1", e.target.value)} placeholder="4515.00" style={inp()} /></Field>
                  <Field label="TP2"><input type="number" step="any" value={form.tp2} onChange={(e) => setField("tp2", e.target.value)} placeholder="4530.00" style={inp()} /></Field></Row>
                <Row>
                  <Field label="% AT RF"><input type="number" value={form.splitA} onChange={(e) => setField("splitA", e.target.value)} style={inp()} /></Field>
                  <Field label="% TP1"><input type="number" value={form.splitB} onChange={(e) => setField("splitB", e.target.value)} style={inp()} /></Field>
                  <Field label="% TP2"><input type="number" value={form.splitC} onChange={(e) => setField("splitC", e.target.value)} style={inp()} /></Field>
                </Row>
                {form.scaledOutcome === "Manual" && <Field label="MANUAL EXIT (full pos)"><input type="number" step="any" value={form.exitS} onChange={(e) => setField("exitS", e.target.value)} style={inp()} /></Field>}
              </React.Fragment>
            )}
            <Field label="NOTE (optional)"><input value={form.note} onChange={(e) => setField("note", e.target.value)} placeholder="reason, session, etc." style={inp()} /></Field>

            {preview && (
              <div style={{ marginTop:10, padding:10, background:C.panel2, borderRadius:8, fontSize:12 }}>
                {!preview.slValid && <div style={{ color:C.red, marginBottom:6 }}>⚠ Check your level ordering for a {preview.dir === 1 ? "long" : "short"} (SL / RF / TP sides).</div>}
                <div style={{ display:"flex", flexWrap:"wrap", gap:"4px 16px", color:C.dim }}>
                  <span>DIR <b style={{ color: preview.dir === 1 ? C.green : C.red }}>{preview.dir === 1 ? "LONG" : "SHORT"}</b></span>
                  <span>RISK <b style={{ color: riskPct > 2.5 ? C.red : C.text }}>${fmt(preview.dollarRisk)} ({fmt(riskPct,2)}%)</b></span>
                  <span>PLANNED <b style={{ color:C.blue }}>1:{fmt(preview.plannedRR)}</b></span>
                  {preview.scaled && <span>BLENDED if full <b style={{ color:C.amber }}>{fmt(preview.blendedFullR)}R</b></span>}
                  <span>RESULT <b style={{ color: preview.result >= 0 ? C.green : C.red }}>{preview.result >= 0 ? "+" : "−"}${fmt(Math.abs(preview.result))} ({preview.rMultiple>=0?"+":""}{fmt(preview.rMultiple)}R)</b></span>
                </div>
              </div>
            )}
            <button onClick={saveTrade} disabled={!preview || syncing} style={{ width:"100%", marginTop:12, background: preview && !syncing ?C.green:C.line, color: preview && !syncing ?"#06251a":C.dim, border:"none", padding:"12px", borderRadius:8, fontWeight:700, fontSize:14 }}>{syncing ? "Saving…" : (editId ? "UPDATE TRADE" : "LOG TRADE")}</button>
          </div>
        )}

        {pane === "wd" && (() => {
          const dep = wd.type === "deposit", col = dep ? C.green : C.amber, valid = parseFloat(wd.amount) > 0 && !syncing;
          return (
          <div style={{ background:C.panel, border:"1px solid " + col + "33", borderRadius:10, padding:14, marginBottom:16 }}>
            <div style={{ display:"flex", gap:4, background:C.bg, border:"1px solid " + C.line, borderRadius:6, padding:3, marginBottom:10 }}>
              {[["deposit","⤒ Deposit"],["withdrawal","⤓ Withdrawal"]].map(([v,lbl]) => <button key={v} onClick={() => setWd({ ...wd, type: v })} style={{ flex:1, background: wd.type===v?C.panel2:"transparent", color: wd.type===v?(v==="deposit"?C.green:C.amber):C.dim, border:"none", padding:"7px", borderRadius:4, fontSize:12, fontWeight: wd.type===v?700:400 }}>{lbl}</button>)}
            </div>
            <div style={{ color:col, fontSize:11, letterSpacing:"0.5px", marginBottom:10 }}>{dep ? "ADD CAPITAL — increases balance (initial funding or top-up)." : "WITHDRAW — reduces balance; next period reports from the lower baseline."}</div>
            <Row><Field label="DATE"><input type="date" value={wd.date} onChange={(e) => setWd({ ...wd, date: e.target.value })} style={inp()} /></Field>
              <Field label="AMOUNT ($)"><input type="number" step="any" value={wd.amount} onChange={(e) => setWd({ ...wd, amount: e.target.value })} placeholder="200" style={inp()} /></Field></Row>
            <Field label="NOTE (optional)"><input value={wd.note} onChange={(e) => setWd({ ...wd, note: e.target.value })} placeholder={dep ? "initial deposit, top-up" : "profit split, monthly payout"} style={inp()} /></Field>
            <button onClick={saveWd} disabled={!valid} style={{ width:"100%", marginTop:6, background: valid ? col : C.line, color: valid ? (dep?"#06251a":"#2a1c02") : C.dim, border:"none", padding:"12px", borderRadius:8, fontWeight:700, fontSize:14 }}>{syncing ? "Saving…" : (dep ? "RECORD DEPOSIT" : "RECORD WITHDRAWAL")}</button>
          </div>
          );
        })()}

        </div>
        <div style={wide ? { flex:1, minWidth:0 } : undefined}>

        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10, flexWrap:"wrap", gap:8 }}>
          <div style={{ display:"flex", gap:4, background:C.panel, border:"1px solid " + C.line, borderRadius:8, padding:3 }}>
            {["day","week","month"].map((m) => <button key={m} onClick={() => setGroupBy(m)} style={{ background: groupBy===m?C.panel2:"transparent", color: groupBy===m?C.text:C.dim, border:"none", padding:"6px 12px", borderRadius:6, fontSize:11, fontWeight: groupBy===m?700:400 }}>{m.toUpperCase()}</button>)}
          </div>
          <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
            {model.groups.length > 0 && <button onClick={toggleAll} style={{ background:"transparent", border:"1px solid " + C.line, color:C.dim, padding:"6px 10px", borderRadius:6, fontSize:11 }}>{allCollapsed ? "EXPAND ALL" : "COLLAPSE ALL"}</button>}
            <button onClick={backup} style={{ background:"transparent", border:"1px solid " + C.line, color:C.dim, padding:"6px 10px", borderRadius:6, fontSize:11 }}>⤓ Backup</button>
            <button onClick={() => fileRef.current && fileRef.current.click()} style={{ background:"transparent", border:"1px solid " + C.line, color:C.dim, padding:"6px 10px", borderRadius:6, fontSize:11 }}>⤒ Restore</button>
            <button onClick={exportCSV} style={{ background:"transparent", border:"1px solid " + C.line, color:C.dim, padding:"6px 10px", borderRadius:6, fontSize:11 }}>⤓ CSV</button>
            <input ref={fileRef} type="file" accept="application/json,.json" style={{ display:"none" }} onChange={(e) => { restore(e.target.files[0]); e.target.value = ""; }} />
          </div>
        </div>

        {model.groups.length === 0 ? (
          <div style={{ textAlign:"center", color:C.dim, padding:"40px 0", fontSize:13 }}>No trades yet. Log your first signal above.</div>
        ) : model.groups.map((g) => {
          const isOpen = !collapsed[g.key], plPct = g.openBal > 0 ? (g.pl / g.openBal) * 100 : 0, pc = g.pl > 0 ? C.green : g.pl < 0 ? C.red : C.dim;
          return (
            <div key={g.key} style={{ marginBottom:10 }}>
              <div onClick={() => toggle(g.key)} style={{ display:"flex", alignItems:"center", gap:10, background:C.panel2, border:"1px solid " + C.line, borderRadius:8, padding:"10px 12px", cursor:"pointer" }}>
                <span style={{ color:C.dim, fontSize:12, transform: isOpen ? "rotate(90deg)" : "none", transition:"transform .15s" }}>▶</span>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontWeight:700, fontSize:13 }}>{g.label}</div>
                  <div style={{ color:C.dim, fontSize:10.5, marginTop:1 }}>{g.trades} trade{g.trades!==1?"s":""} · <span style={{ color:C.green }}>{g.wins}W</span> <span style={{ color:C.red }}>{g.losses}L</span>{g.be?" " + g.be + "BE":""}{g.deposited>0 && <span style={{ color:C.green }}> · ⤒ ${fmt(g.deposited,0)}</span>}{g.withdrawn>0 && <span style={{ color:C.amber }}> · ⤓ ${fmt(g.withdrawn,0)}</span>}</div>
                  <div style={{ color:C.dim, fontSize:10.5, marginTop:1 }}>open <b style={{ color:C.text }}>${fmt(g.openBal)}</b> → close <b style={{ color: g.closeBal>=g.openBal?C.green:C.red }}>${fmt(g.closeBal)}</b></div>
                </div>
                <div style={{ textAlign:"right" }}>
                  <div style={{ color:pc, fontWeight:700, fontSize:14 }}>{g.pl >= 0 ? "+" : "−"}${fmt(Math.abs(g.pl))}</div>
                  <div style={{ color:pc, fontSize:10.5 }}>{plPct >= 0 ? "+" : ""}{fmt(plPct,1)}%</div>
                </div>
              </div>
              {isOpen && <div style={{ marginTop:6, paddingLeft:6 }}>{g.items.map((e) => e.kind === "trade" ? <TradeCard key={e.id} e={e} onEdit={editTrade} onDel={deleteTrade} /> : <WdCard key={e.id} e={e} onDel={deleteWd} />)}</div>}
            </div>
          );
        })}

        </div>
        </div>

        <div style={{ color:C.dim, fontSize:10, lineHeight:1.6, marginTop:24, borderTop:"1px solid " + C.line, paddingTop:12 }}>
          Shared cloud journal — you and Dani see the same trades from any device. Tap ↻ Sync to pull the latest after the other person logs a trade. Export CSV regularly as a backup.
        </div>
      </div>
    </div>
  );
}

function App() {
  const [session, setSession] = useState(null);
  const [ready, setReady] = useState(false);
  useEffect(() => {
    if (!CONFIG_OK) { setReady(true); return; }
    sb.auth.getSession().then(({ data }) => { setSession(data.session); setReady(true); });
    const { data: subc } = sb.auth.onAuthStateChange((_e, s) => setSession(s));
    return () => subc.subscription.unsubscribe();
  }, []);
  if (!CONFIG_OK) return <ConfigNeeded />;
  if (!ready) return centerBox(<div style={{ color:C.dim, textAlign:"center" }}>Loading…</div>);
  if (!session) return <Login />;
  return <TradeJournal session={session} onSignOut={() => sb.auth.signOut()} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
